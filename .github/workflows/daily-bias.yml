name: Daily ICT Bias Analysis

on:
  # Daily cron PAUSED while we refine the strategy — re-enable by
  # uncommenting the schedule block below.
  # schedule:
  #   - cron: "0 6 * * 1-5"

  # Manual trigger only for now
  workflow_dispatch:

jobs:
  generate-bias:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit results back to the repo

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      # 3. Install Python dependencies
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # 4. Run the ICT analysis
      - name: Generate daily bias
        env:
          ANTHROPIC_API_KEY: ${{ secrets.DAILYBIASKEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY is empty — check DAILYBIASKEY secret"
          else
            echo "API key loaded OK (length: ${#ANTHROPIC_API_KEY})"
          fi
          cd scripts
          python generate_bias.py

      # 5. Commit and push the new JSON files
      - name: Commit bias data
        run: |
          git config user.name  "ICT Bias Bot"
          git config user.email "bias-bot@users.noreply.github.com"
          git add data/bias/
          git diff --staged --quiet || git commit -m "bias: $(date -u +%Y-%m-%d) daily analysis"
          git push

      # 6. Trigger Vercel redeploy (optional — Vercel auto-deploys on push anyway)
      # If you want an explicit webhook, add VERCEL_DEPLOY_HOOK to repo secrets and uncomment:
      # - name: Trigger Vercel deploy
      #   run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
